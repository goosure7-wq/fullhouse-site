<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Fullhouse Pill</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkout-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; align-items: start; }
        .checkout-form { background: white; padding: 30px; border-radius: var(--border-radius); border: 1px solid var(--border-color); }
        .checkout-summary { background: var(--bg-light); padding: 30px; border-radius: var(--border-radius); position: sticky; top: 100px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--secondary); }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: var(--border-radius); font-family: inherit; }
        .summary-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        .payment-methods { margin-top: 30px; }
        .payment-method { border: 1px solid var(--border-color); padding: 15px; border-radius: var(--border-radius); margin-bottom: 10px; background: white;}
        .payment-method label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 600;}
        .payment-method p { margin-top: 10px; margin-left: 25px; color: var(--text-muted); font-size: 0.9rem; }
        
        @media (max-width: 768px) {
            .checkout-layout { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container header-inner">
            <div class="logo">
                <a href="index.html"><h1><i class="fa-solid fa-pills"></i> Fullhouse <span>Pill</span></h1></a>
            </div>
            <nav class="desktop-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>
            <div class="header-right"></div>
        </div>
    </header>

    <div class="container section-padding">
        <div class="section-title">
            <h2>Checkout</h2>
            <div class="title-line"></div>
        </div>
        
        <div id="checkoutView">
            <form onsubmit="handleCheckout(event)" class="checkout-layout">
                <div class="checkout-form">
                    <h3 style="margin-bottom: 20px;">Billing & Shipping Details</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name *</label>
                            <input type="text" required>
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>Email Address *</label>
                        <input type="email" required>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>Street Address *</label>
                        <input type="text" placeholder="House number and street name" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>City *</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>State / Province *</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>ZIP / Postal Code *</label>
                            <input type="text" required>
                        </div>
                    </div>
                </div>

                <div class="checkout-summary">
                    <h3 style="margin-bottom: 20px;">Your Order</h3>
                    <div id="orderItems">
                        <!-- Populated via JS -->
                    </div>

                    <div class="summary-item" style="border-bottom: none; border-top: 2px solid var(--primary); margin-top: 10px; padding-top: 20px;">
                        <strong style="font-size: 1.2rem;">Total</strong>
                        <strong style="font-size: 1.2rem; color: var(--primary);" id="orderTotal">$0.00</strong>
                    </div>

                    <div class="payment-methods">
                        <div class="payment-method">
                            <label>
                                <input type="radio" name="payment" value="card" checked>
                                Secure Credit Card (Mock)
                            </label>
                            <p>Pay securely using our mocked payment portal. No actual card charged.</p>
                        </div>
                        <div class="payment-method">
                            <label>
                                <input type="radio" name="payment" value="crypto">
                                Cryptocurrency
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; font-size: 1.1rem; padding: 15px;">Place Order</button>
                    
                    <p style="text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 15px;">
                        <i class="fa-solid fa-lock"></i> SSL Secured Checkout. Your personal data is protected.
                    </p>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p class="text-center" style="margin-bottom: 20px;">&copy; 2026 Fullhouse Pill.</p>
        </div>
    </footer>

    <script src="products.js"></script>
    <script>
        function renderCheckout() {
            const items = Cart.getItems();
            if (items.length === 0) {
                document.getElementById('checkoutView').innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <h3>Cannot proceed. Your cart is empty!</h3><br>
                        <a href="shop.html" class="btn btn-primary">Return to Shop</a>
                    </div>
                `;
                return;
            }

            const itemsContainer = document.getElementById('orderItems');
            let itemsHtml = '';
            
            items.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if(product) {
                    itemsHtml += `
                        <div class="summary-item">
                            <span>${product.title} <b>× ${item.quantity}</b></span>
                            <span>$${(product.price * item.quantity).toFixed(2)}</span>
                        </div>
                    `;
                }
            });

            itemsContainer.innerHTML = itemsHtml;
            document.getElementById('orderTotal').textContent = `$${Cart.getSubtotal().toFixed(2)}`;
        }

        function handleCheckout(event) {
            event.preventDefault();
            const form = event.target;
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const items = Cart.getItems();
            if (!items || items.length === 0) {
                alert('Unable to place order: your cart is empty. Please add items and try again.');
                return;
            }

            try {
                document.getElementById('checkoutView').innerHTML = `
                    <div style="text-align: center; padding: 50px; background: var(--bg-light); border-radius: var(--border-radius);">
                        <i class="fa-solid fa-circle-check" style="font-size: 4rem; color: var(--primary); margin-bottom: 20px;"></i>
                        <h2 style="color: var(--primary); margin-bottom: 15px;">Thank You For Your Order!</h2>
                        <p>Your order number is <strong>#FHP-${Math.floor(Math.random() * 90000) + 10000}</strong>.</p>
                        <p style="margin-bottom: 20px;">We have received your mock order and it is being processed.</p>
                        <a href="index.html" class="btn btn-primary">Return to Home</a>
                    </div>
                `;
                Cart.clearCart();
            } catch (error) {
                console.error('Checkout failed:', error);
                alert('There was an issue placing your order. Please refresh the page and try again.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCheckout();
        });
    </script>
</body>
</html>
